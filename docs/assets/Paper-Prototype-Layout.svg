<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <rect width="1200" height="900" fill="#f4efe4"/>
  <rect x="28" y="26" width="1148" height="848" rx="28" fill="#d8cfbf" opacity="0.45"/>
  <rect x="20" y="18" width="1148" height="848" rx="28" fill="#f8f3ea" stroke="#bcae95" stroke-width="4"/>
  <rect x="410" y="42" width="430" height="56" rx="18" fill="#ede4d4" stroke="#c7baa3" stroke-width="2"/>
  <text x="625" y="77" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#435264">Palace Layout Sketch</text>
  <rect x="42" y="34" width="340" height="250" rx="20" fill="#fbf8f1" stroke="#c7baa3" stroke-width="3"/>
  <text x="70" y="78" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="700" fill="#1f2a38">
    <tspan x="70" dy="0">Visual Education</tspan>
    <tspan x="70" dy="32">System</tspan>
  </text>
  <text x="70" y="154" font-family="Helvetica, Arial, sans-serif" font-size="21" fill="#435264">
    <tspan x="70" dy="0">Paper Prototype</tspan>
    <tspan x="70" dy="24">Layout</tspan>
  </text>
  <text x="70" y="220" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#435264">
    <tspan x="70" dy="0">Low-fidelity plan for Meeting #2:</tspan>
    <tspan x="70" dy="22">layout, room identity, and</tspan>
    <tspan x="70" dy="22">user flow</tspan>
  </text>
  <rect x="420" y="290" width="360" height="220" rx="18" fill="#315f9d" stroke="#1f2a38" stroke-width="4"/>
  <text x="600" y="360" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff">ENTRY HALL</text>
  <text x="600" y="400" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#ffffff">Palace name plaque</text>
  <text x="600" y="432" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#ffffff">Central landmark</text>
  <text x="600" y="464" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#ffffff">Edit palace name</text>

  <rect x="850" y="320" width="220" height="160" rx="16" fill="#c46a43" stroke="#1f2a38" stroke-width="4"/>
  <text x="960" y="380" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="700" fill="#ffffff">ROOM 01</text>
  <text x="960" y="418" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#ffffff">Circle icon</text>

  <rect x="490" y="110" width="220" height="160" rx="16" fill="#3f8d55" stroke="#1f2a38" stroke-width="4"/>
  <text x="600" y="170" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="700" fill="#ffffff">ROOM 02</text>
  <text x="600" y="208" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#ffffff">Triangle icon</text>

  <rect x="490" y="590" width="220" height="160" rx="16" fill="#7a4aa3" stroke="#1f2a38" stroke-width="4"/>
  <text x="600" y="650" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="700" fill="#ffffff">ROOM 03</text>
  <text x="600" y="688" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#ffffff">Diamond icon</text>

  <rect x="120" y="320" width="220" height="160" rx="16" fill="#c8b447" stroke="#1f2a38" stroke-width="4" stroke-dasharray="12 8"/>
  <text x="230" y="380" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="700" fill="#ffffff">ROOM 04</text>
  <text x="230" y="418" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#ffffff">Added from hall</text>

  <line x1="780" y1="400" x2="850" y2="400" stroke="#1f2a38" stroke-width="8"/>
  <line x1="600" y1="290" x2="600" y2="270" stroke="#1f2a38" stroke-width="8"/>
  <line x1="600" y1="510" x2="600" y2="590" stroke="#1f2a38" stroke-width="8"/>
  <line x1="420" y1="400" x2="340" y2="400" stroke="#1f2a38" stroke-width="8" stroke-dasharray="12 8"/>

  <text x="92" y="748" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#1f2a38">Player Flow</text>
  <rect x="90" y="772" width="1020" height="92" rx="14" fill="#ffffff" stroke="#1f2a38" stroke-width="3"/>
  <text x="600" y="810" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#1f2a38">User flow: create/load palace -> orient in Entry Hall -> explore rooms</text>
  <text x="600" y="838" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#1f2a38">-> press E to edit -> save -> reload to verify persistence</text>

  <rect x="820" y="530" width="300" height="118" rx="16" fill="#fffdf7" stroke="#1f2a38" stroke-width="3"/>
  <text x="970" y="570" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#1f2a38">Prototype Questions</text>
  <text x="970" y="600" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#435264">Can players orient quickly?</text>
  <text x="970" y="624" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#435264">Do room cues stay memorable?</text>

  <rect x="880" y="220" width="260" height="78" rx="12" fill="#ffffff" stroke="#1f2a38" stroke-width="3"/>
  <text x="1010" y="255" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#1f2a38">Identity Cues</text>
  <text x="1010" y="282" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#435264">Names, colors, signs, icons</text>
</svg>
